<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
</head>

<body>

<header>

    <div class="logo">
        <i class="fa-solid fa-bag-shopping"></i>
        <h2>Nexora</h2>
    </div>

    <div class="search-box">

        <input type="text" placeholder="Search products...">

        <button>
            <i class="fa-solid fa-search"></i>
        </button>

    </div>

    <nav>

        <a href="index.html">Home</a>

        <a href="cart.html">Cart</a>

        <a href="login.html">Login</a>

        <a href="register.html">Register</a>

    </nav>

</header>

<section class="hero">

    <div class="hero-text">

        <h1>Discover Amazing Products</h1>

        <p>
            Best gadgets at the best prices.
        </p>

        <button>
            Shop Now
        </button>

    </div>

</section>
<section class="categories">

    <div class="category">
        💻
        <h3>Electronics</h3>
    </div>

    <div class="category">
        📱
        <h3>Mobiles</h3>
    </div>

    <div class="category">
        ⌚
        <h3>Accessories</h3>
    </div>

    <div class="category">
        🎧
        <h3>Audio</h3>
    </div>

</section>
<h2 class="section-title">
    🔥 Trending Products
</h2>

<section class="products">

<div class="card">

    <span class="badge">20% OFF</span>

    <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=500" alt="Laptop">

    <h3>Gaming Laptop</h3>

    <div class="rating">
        ⭐⭐⭐⭐⭐
    </div>

    <p class="old-price">₹74,999</p>

    <p class="price">₹59,999</p>

    <button onclick="addToCart('Gaming Laptop')">
        Add to Cart
    </button>

</div>

    <div class="card">

        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500" alt="Phone">

        <h3>Smart Phone</h3>

        <p class="price">₹24,999</p>

        <button onclick="addToCart('Smart Phone')">
            Add to Cart
        </button>

    </div>

    <div class="card">

        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500" alt="Headphones">

        <h3>Headphones</h3>

        <p class="price">₹2,999</p>

        <button onclick="addToCart('Headphones')">
            Add to Cart
        </button>

    </div>

    <div class="card">

        <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=500" alt="Watch">

        <h3>Smart Watch</h3>

        <p class="price">₹4,999</p>

        <button onclick="addToCart('Smart Watch')">
            Add to Cart
        </button>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
